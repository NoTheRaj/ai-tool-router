<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Tool Router</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- TOP BAR -->
    <!-- app-name is clickable — resets to landing when in result mode -->
    <header class="top-bar">
      <span class="app-name" id="app-name">AI Tool Router</span>
      <div class="top-bar-actions">
        <!-- btn-new is hidden by default, only shows in result mode via CSS -->
        <button class="btn-ghost" id="btn-new">New</button>
        <button class="btn-ghost">Log in</button>
      </div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content">

      <!-- LANDING COMPOSER: visible on load, hidden in result mode -->
      <section class="composer" id="composer-landing">

        <div class="tool-selector" role="group" aria-label="Select a tool">
          <button class="tool-chip active">Summarize</button>
          <button class="tool-chip">Explain</button>
          <button class="tool-chip">Quiz</button>
          <button class="tool-chip">Rewrite</button>
        </div>

        <textarea
          class="input-area"
          id="input-landing"
          placeholder="Paste your text here..."
          rows="8"
        ></textarea>

        <div class="composer-footer">
          <button class="btn-primary" id="btn-go-landing">Go</button>
        </div>

      </section>

      <!-- OUTPUT AREA: hidden by default, visible in result mode -->
      <section class="output-area" id="output-area">

        <!-- Shows which tool was used, e.g. "Summary" or "Explanation" -->
        <div class="output-header">
          <span class="output-label" id="output-label">Summary</span>
        </div>

        <!-- The actual mock/real AI response goes here -->
        <div class="output-content" id="output-content"></div>

      </section>

    </main>

    <!-- BOTTOM DOCK: hidden by default, visible in result mode -->
    <!-- Sticks to the bottom of the viewport as the output scrolls -->
    <div class="bottom-dock" id="bottom-dock">
      <div class="dock-inner">

        <textarea
          class="input-area dock-input"
          id="input-dock"
          placeholder="Follow up or paste new text..."
          rows="3"
        ></textarea>

        <div class="composer-footer">
          <button class="btn-primary" id="btn-go-dock">Go</button>
        </div>

      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
